version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: rooms-test-db
    environment:
      POSTGRES_USER: rooms_test
      POSTGRES_PASSWORD: rooms_test_pass
      POSTGRES_DB: rooms_test
    ports:
      - "5433:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rooms_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-test-data:
